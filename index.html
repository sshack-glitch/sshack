<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SONIX HACK </title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #090d16;
            overflow: hidden; font-family: system-ui, -apple-system, sans-serif;
            -webkit-user-select: none; user-select: none; touch-action: manipulation;
            overscroll-behavior: none !important;
        }
        .obsidian-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .scroll-clean::-webkit-scrollbar { width: 4px; }
        .scroll-clean::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.5); border-radius: 4px; }
    </style>
</head>
<body class="text-slate-200 p-3 flex flex-col justify-between h-screen">

    <!-- ================= 🔐 GÜVENLİK DUVARI (SONIX HACK GATEWAY) ================= -->
    <div id="auth-screen" class="fixed inset-0 z-50 bg-[#090d16] flex flex-col justify-center items-center p-6 select-none">
        <div class="obsidian-panel p-6 rounded-2xl w-full max-w-sm text-center space-y-4 shadow-2xl border border-red-500/20">
            <div class="w-16 h-16 bg-red-950/30 border border-red-500/40 rounded-2xl flex items-center justify-center mx-auto shadow-inner">
                <i class="fa-solid fa-terminal text-red-500 text-2xl animate-pulse"></i>
            </div>
            <div>
                <h2 class="text-white font-mono font-black tracking-wider text-sm">SONIX HACK </h2>
                <p class="text-[10px] text-red-400 font-mono mt-0.5">
                    
                       // LN-2026-STATION</p>
            </div>
            
            <div class="space-y-2 text-left">
                <label class="text-[10px] font-mono font-bold text-slate-400">UYGULAMA ERİŞİM ANAHTARI</label>
                <div class="relative flex items-center">
                    <input type="password" id="gate-pass" inputmode="numeric" placeholder="Sayısal şifreyi gir..." class="w-full bg-slate-950 border border-white/10 pl-3 pr-10 py-2.5 rounded-xl text-center font-mono text-sm tracking-widest text-red-400 focus:outline-none focus:border-red-500 transition">
                    <button type="button" onclick="togglePasswordVisibility()" class="absolute right-3 text-slate-500 hover:text-slate-300 focus:outline-none">
                        <i id="eye-icon" class="fa-solid fa-eye text-xs"></i>
                    </button>
                </div>
            </div>

            <button onclick="checkGatePassword()" class="w-full bg-red-600 hover:bg-red-500 text-white font-mono font-bold text-xs uppercase py-3 rounded-xl transition active:scale-95 shadow-md shadow-red-600/20 cursor-pointer">
                UYGULAMAYI BAŞLAT
            </button>

            <div class="pt-2 border-t border-white/5">
                <a href="https://t.me/sonixhack" target="_blank" class="inline-block text-[10px] font-mono text-slate-500 hover:text-red-400 transition cursor-pointer">
                    <i class="fa-solid fa-user-shield mr-1"></i> Yetki Şifre Yönetimi Al   (@sonixhack)
                </a>
            </div>
        </div>
    </div>

    <!-- ================= 📱 ANA UYGULAMA İÇERİĞİ (SONIX HACK) ================= -->
    <div id="main-application" class="hidden flex-col justify-between h-full w-full">
        <!-- Header -->
        <div class="obsidian-panel w-full p-3 rounded-2xl flex justify-between items-center shadow-xl">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                <span class="font-mono font-black tracking-wider text-xs text-slate-100">SONIX HACK </span>
            </div>
            <span id="global-status" class="bg-slate-900 text-red-400 text-[10px] px-2.5 py-0.5 rounded-full border border-red-500/20 font-mono font-bold">CORE_READY</span>
        </div>

        <!-- İçerik -->
        <div class="flex-1 my-2 overflow-y-auto space-y-3 pr-1 scroll-clean">
            <!-- Kripto -->
            <div class="grid grid-cols-2 gap-2">
                <div class="obsidian-panel p-3 rounded-xl flex justify-between items-center shadow-md">
                    <div class="flex items-center gap-2"><i class="fa-brands fa-bitcoin text-amber-500 text-base"></i><span class="text-[11px] font-bold text-white font-mono">BTC</span></div>
                    <div class="text-right font-mono"><div id="btc-price" class="text-xs font-bold text-slate-100">$94,231.70</div></div>
                </div>
                <div class="obsidian-panel p-3 rounded-xl flex justify-between items-center shadow-md">
                    <div class="flex items-center gap-2"><i class="fa-brands fa-ethereum text-blue-400 text-base"></i><span class="text-[11px] font-bold text-white font-mono">ETH</span></div>
                    <div class="text-right font-mono"><div id="eth-price" class="text-xs font-bold text-slate-100">$3,419.95</div></div>
                </div>
            </div>

            <!-- Terminal -->
            <div class="obsidian-panel p-3 rounded-xl space-y-2 flex flex-col">
                <div class="flex justify-between items-center">
                    <label class="text-[10px] uppercase tracking-wider block text-red-400 font-bold font-mono">📡 LIVE BOT TERMINAL FLUX</label>
                    <button onclick="toggleBotStream()" id="btn-stream" class="bg-red-600 hover:bg-red-500 text-white px-3 py-1 rounded-lg text-[10px] font-bold uppercase transition active:scale-95 cursor-pointer">BAĞLAN</button>
                </div>
                <div class="rounded-xl p-3 bg-slate-950/50 font-mono text-[11px] overflow-y-auto space-y-2 scroll-clean h-[130px]" id="tg-log-box">
                    <div class="text-slate-500 italic">> İzlemeyi başlatmak için sisteme bağlanın...</div>
                </div>
                <div class="grid grid-cols-3 gap-1.5">
                    <input type="number" id="reply-chat-id" placeholder="Hedef ID..." class="col-span-1 bg-slate-950 border border-white/5 px-2 py-1.5 text-xs rounded-lg font-mono text-slate-200">
                    <input type="text" id="reply-text" placeholder="Mesajı yaz..." class="col-span-1 bg-slate-950 border border-white/5 px-2 py-1.5 text-xs rounded-lg text-slate-200">
                    <button onclick="sendTelegramMessage()" class="col-span-1 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-[11px] font-bold uppercase transition active:scale-95 cursor-pointer"><i class="fa-solid fa-paper-plane mr-1"></i>AT</button>
                </div>
            </div>

            <!-- TikTok -->
            <div class="obsidian-panel p-3 rounded-xl space-y-2.5">
                <label class="text-[10px] uppercase tracking-wider block text-purple-400 font-bold font-mono"><i class="fa-solid fa-cloud-arrow-down mr-1"></i> TIKTOK VİDEO BYPASS ENGINE</label>
                <div class="space-y-1.5">
                    <input type="text" id="media-url" placeholder="TikTok linkini yapıştır..." class="w-full bg-slate-950 border border-white/5 px-3 py-2 text-xs rounded-lg text-slate-200">
                    <input type="number" id="dl-chat-id" placeholder="Telegram ID..." class="w-full bg-slate-950 border border-white/5 px-3 py-2 text-xs rounded-lg text-slate-200 font-mono">
                    <button onclick="processAndSendMedia()" class="w-full bg-gradient-to-r from-purple-600 to-red-600 hover:opacity-90 text-white font-bold text-xs uppercase py-2.5 rounded-lg transition active:scale-[0.98] shadow-lg cursor-pointer"><i class="fa-solid fa-download mr-1"></i> VİDEOYU SÖK VE AT</button>
                </div>
                <div class="rounded-lg bg-slate-950/40 p-2 text-center font-mono text-[10px]" id="dl-status-box"><span class="text-slate-500">> Sistem komut bekliyor...</span></div>
            </div>
        </div>

        <!-- Token & Alt Kısım -->
        <div class="obsidian-panel w-full p-2 rounded-xl mb-1 flex items-center justify-between gap-2">
            <span class="text-[9px] font-mono text-slate-400 font-bold shrink-0">KEY:</span>
            <input type="text" id="bot-token" value="" class="flex-1 bg-slate-950 border border-white/5 px-2 py-1 text-[10px] rounded-lg text-slate-400 font-mono focus:outline-none">
        </div>
        <div class="text-center font-mono text-[9px] text-slate-600 tracking-wider">APP IDENTITY // <a href="https://t.me/sonixhack" class="text-red-500/70 font-bold">@SONIXHACK</a></div>
    </div>

<script>
    // 🔐 12345 SÜPER STABİL ŞİFRE MODÜLÜ
    function checkGatePassword() {
        const inputField = document.getElementById('gate-pass');
        const inputPass = inputField.value.trim();
        
        if (inputPass === "12345") {
            document.getElementById('auth-screen').classList.add('hidden');
            const mainApp = document.getElementById('main-application');
            mainApp.classList.remove('hidden');
            mainApp.classList.add('flex');
            startCryptoStream();
        } else {
            alert("❌ Erişim Reddedildi şifre almak için admin ile iletişime geçin .");
            inputField.value = "";
        }
    }

    function togglePasswordVisibility() {
        const passInput = document.getElementById('gate-pass');
        const eyeIcon = document.getElementById('eye-icon');
        if (passInput.type === "password") {
            passInput.type = "text";
            eyeIcon.className = "fa-solid fa-eye-slash text-xs text-red-400";
        } else {
            passInput.type = "password";
            eyeIcon.className = "fa-solid fa-eye text-xs text-slate-500";
        }
    }

    document.getElementById('gate-pass').addEventListener('keypress', function(e) {
        if (e.token === 'Enter') checkGatePassword();
    });

    let isListening = false, updateOffset = 0, streamInterval = null;
    const logBox = document.getElementById('tg-log-box'), globalStatus = document.getElementById('global-status');

    function startCryptoStream() {
        setInterval(() => {
            const btcEl = document.getElementById('btc-price');
            const ethEl = document.getElementById('eth-price');
            if(!btcEl || !ethEl) return;
            let currentBtc = parseFloat(btcEl.innerText.replace('$', '').replace(',', ''));
            let currentEth = parseFloat(ethEl.innerText.replace('$', '').replace(',', ''));
            btcEl.innerText = `$${(currentBtc + (Math.random() - 0.49) * 12).toLocaleString('en-US', {maximumFractionDigits:2})}`;
            ethEl.innerText = `$${(currentEth + (Math.random() - 0.5) * 0.6).toLocaleString('en-US', {maximumFractionDigits:2})}`;
        }, 2000);
    }

    function toggleBotStream() {
        const token = document.getElementById('bot-token').value.trim();
        const btn = document.getElementById('btn-stream');
        if (!token) return alert("Bot Token eksik amk .");

        if (!isListening) {
            isListening = true; btn.innerText = "KAPAT";
            btn.className = "bg-rose-600 text-white px-3 py-1 rounded-lg text-[10px] font-bold uppercase shadow-md cursor-pointer";
            globalStatus.innerText = "LIVE_STREAMING";
            globalStatus.className = "bg-red-950 text-red-400 text-[10px] px-2.5 py-0.5 rounded-full border border-red-500/30 font-mono font-bold animate-pulse";
            logBox.innerHTML = `<div class="text-red-400">> Canlı izleme köprüsü bağlandı...</div>`;
            updateOffset = 0;
            streamInterval = setInterval(() => fetchTelegramUpdates(token), 2000);
        } else {
            isListening = false; clearInterval(streamInterval);
            btn.innerText = "START";
            btn.className = "bg-red-600 text-white px-3 py-1 rounded-lg text-[10px] font-bold uppercase cursor-pointer";
            globalStatus.innerText = "CORE_READY";
            globalStatus.className = "bg-slate-900 text-red-400 text-[10px] px-2.5 py-0.5 rounded-full border border-red-500/20 font-mono font-bold";
            logBox.innerHTML += `<div class="text-slate-500 italic mt-1">> İzleme durduruldu.</div>`;
        }
    }

    async function fetchTelegramUpdates(token) {
        try {
            const response = await fetch(`https://api.telegram.org/bot${token}/getUpdates?offset=${updateOffset + 1}&timeout=2`);
            const data = await response.json();
            if (data.ok && data.result.length > 0) {
                data.result.forEach(update => {
                    updateOffset = update.update_id;
                    if (update.message) {
                        const msg = update.message;
                        const sender = msg.from.first_name || "Anonim";
                        const text = msg.text || "[Medya Dosyası]";
                        const time = new Date(msg.date * 1000).toLocaleTimeString('tr-TR');
                        const logNode = document.createElement('div');
                        logNode.className = "p-2 bg-slate-900/80 border-l-2 border-red-500 rounded-lg text-slate-300";
                        logNode.innerHTML = `<div class="text-[9px] text-red-400 flex justify-between"><strong>${sender} (ID: <span class="text-white select-text">${msg.from.id}</span>)</strong><span>${time}</span></div><div class="text-xs text-slate-200 mt-0.5 select-text">"${text}"</div>`;
                        logBox.appendChild(logNode); logBox.scrollTop = logBox.scrollHeight;
                    }
                });
            }
        } catch (e) {}
    }

    async function sendTelegramMessage() {
        const token = document.getElementById('bot-token').value.trim();
        const chatId = document.getElementById('reply-chat-id').value.trim();
        const text = document.getElementById('reply-text').value.trim();
        if (!token || !chatId || !text) return alert("Alanları doldurun.");
        try {
            const response = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: chatId, text: text })
            });
            if ((await response.json()).ok) {
                logBox.innerHTML += `<div class="p-1.5 bg-emerald-950/20 border-l-2 border-emerald-500 rounded-lg text-slate-400 text-[10px]">> Mesaj fırlatıldı.</div>`;
                logBox.scrollTop = logBox.scrollHeight; document.getElementById('reply-text').value = '';
            }
        } catch (e) {}
    }

    async function processAndSendMedia() {
        const token = document.getElementById('bot-token').value.trim();
        const url = document.getElementById('media-url').value.trim();
        const chatId = document.getElementById('dl-chat-id').value.trim();
        const statusBox = document.getElementById('dl-status-box');

        if (!token || !url || !chatId) return alert(" boş alan bırakmayın.");
        statusBox.innerHTML = `<span class="text-amber-400 animate-pulse">> TikTok indirme motoru başlatılıyor...</span>`;

        try {
            let cleanVideoUrl = "";
            statusBox.innerHTML = `<span class="text-blue-400 animate-pulse">> Sunucu korumaları bypass ediliyor...</span>`;
            
            const formData = new FormData();
            formData.append('url', url);
            formData.append('hd', '1');

            const tikRes = await fetch('https://www.tikwm.com/api/', { method: 'POST', body: formData }).then(r => r.json()).catch(() => null);

            if (tikRes && tikRes.code === 0 && tikRes.data) {
                cleanVideoUrl = tikRes.data.play || tikRes.data.wmplay || tikRes.data.hdplay;
            } else {
                const backupRes = await fetch(`https://api.scraptik.workers.dev/download?url=${encodeURIComponent(url)}`).then(r => r.json()).catch(() => null);
                if (backupRes && (backupRes.video_url || backupRes.url)) {
                    cleanVideoUrl = backupRes.video_url || backupRes.url;
                }
            }

            if (!cleanVideoUrl) {
                statusBox.innerHTML = `<span class="text-rose-400">> Hata: TikTok videosu çözülemedi.</span>`;
                return;
            }

            statusBox.innerHTML = `<span class="text-purple-400 animate-pulse">> Ham video dosyası Telegram CDN havuzuna basılıyor...</span>`;

            const tgResponse = await fetch(`https://api.telegram.org/bot${token}/sendVideo`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: chatId, video: cleanVideoUrl, caption: `📥 Yüklendi.\n⚡ Mod: sonix hack farkıyla`, supports_streaming: true })
            });

            const tgData = await tgResponse.json();
            if (tgData.ok) {
                statusBox.innerHTML = `<span class="text-emerald-400 font-bold">> [BAŞARILI] Video bota indirildi!</span>`;
                document.getElementById('media-url').value = '';
            } else {
                statusBox.innerHTML = `<span class="text-rose-400">> Telegram Hatası: ${tgData.description || 'Yüklenemedi.'}</span>`;
            }
        } catch (error) {
            statusBox.innerHTML = `<span class="text-rose-500">> Bağlantı Hatası: Sinyal kesildi.</span>`;
        }
    }
</script>
</body>
</html>
