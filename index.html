<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONİX | Canlı Bot Sunucu Paneli</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex flex-col">

    <nav class="bg-gray-900 border-b border-gray-800 p-4 shadow-md">
        <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-bold tracking-wider text-indigo-400 flex items-center gap-2">
                <i class="fa-solid fa-terminal text-emerald-400"></i> SONİX BOT LIVE LOG SERVER
            </h1>
            <div class="flex items-center gap-3">
                <span id="server-status" class="bg-red-500/10 text-red-400 text-xs px-3 py-1 rounded-full border border-red-500/20 flex items-center gap-1.5">
                    <span class="h-2 w-2 rounded-full bg-red-500"></span> Sunucu Kapalı
                </span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 sm:p-6 flex-1 flex flex-col gap-6">
        
        <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 shadow-lg flex flex-col sm:flex-row gap-4 items-end">
            <div class="flex-1 w-full">
                <label class="text-xs text-gray-400 font-mono block mb-1">TELEGRAM BOT TOKEN ENTRY:</label>
                <input type="text" id="bot-token" value="8738504549:AAHBiEr6JMEE-g8dGAqfe_4UfIOe3NR9neQ" placeholder="Token giriniz..." class="w-full bg-gray-950 border border-gray-700 p-2.5 rounded text-indigo-300 font-mono text-sm focus:outline-none focus:border-indigo-500">
            </div>
            <button onclick="toggleServer()" id="btn-listen" class="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-6 py-2.5 rounded shadow transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-play"></i> Dinlemeyi Başlat (Start Server)
            </button>
        </div>

        <div class="bg-gray-900 rounded-xl border border-gray-800 p-4 shadow-lg flex flex-col flex-1 min-h-[400px]">
            <div class="flex justify-between items-center mb-3 border-b border-gray-800 pb-2">
                <h2 class="text-sm font-semibold text-emerald-400 font-mono flex items-center gap-2">
                    <i class="fa-solid fa-circle-notch animate-spin text-xs hidden" id="loading-spinner"></i> Gelen Mesaj Logları (Canlı)
                </h2>
                <button onclick="clearLogs()" class="text-xs text-gray-500 hover:text-gray-300 transition">Konsolu Temizle</button>
            </div>
            
            <div id="console-logs" class="overflow-y-auto flex-1 bg-gray-950 p-4 rounded-lg font-mono text-xs text-green-400 space-y-3 border border-gray-800 max-h-[500px]">
                <p class="text-gray-600 italic">[Sistem hazır. Dinlemeyi başlatmak için yukarıdaki butona tıklayın...]</p>
            </div>
        </div>
    </div>

    <script>
        let isListening = false;
        let lastUpdateId = 0;
        let pollingInterval = null;

        const serverStatus = document.getElementById('server-status');
        const btnListen = document.getElementById('btn-listen');
        const consoleLogs = document.getElementById('console-logs');
        const spinner = document.getElementById('loading-spinner');

        // Konsola şık log basma fonksiyonu
        function logToConsole(message, type = 'info') {
            const time = new Date().toLocaleTimeString('tr-TR');
            let colorClass = "text-gray-400";
            
            if (type === 'success') colorClass = "text-green-400 font-bold border-l-2 border-green-500 pl-2 bg-green-500/5 py-1 rounded";
            if (type === 'error') colorClass = "text-red-400 font-bold";
            if (type === 'system') colorClass = "text-indigo-400 italic";

            const logItem = document.createElement('div');
            logItem.className = `mb-1 ${colorClass}`;
            logItem.innerHTML = `<span class="text-gray-600">[${time}]</span> ${message}`;
            
            consoleLogs.appendChild(logItem);
            consoleLogs.scrollTop = consoleLogs.scrollHeight; // Otomatik aşağı kaydır
        }

        function clearLogs() {
            consoleLogs.innerHTML = '<p class="text-gray-600 italic">[Konsol temizlendi...]</p>';
        }

        // Sunucuyu Aç / Kapat
        function toggleServer() {
            const token = document.getElementById('bot-token').value.trim();
            if (!token) {
                alert("Lütfen önce geçerli bir Bot Token girin!");
                return;
            }

            if (!isListening) {
                // Dinlemeyi Başlat
                isListening = true;
                btnListen.innerHTML = `<i class="fa-solid fa-stop"></i> Dinlemeyi Durdur`;
                btnListen.className = "w-full sm:w-auto bg-red-600 hover:bg-red-700 text-white font-semibold px-6 py-2.5 rounded shadow transition flex items-center justify-center gap-2";
                serverStatus.innerHTML = `<span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span> Sunucu Aktif (Dinliyor...)`;
                serverStatus.className = "bg-emerald-500/10 text-emerald-400 text-xs px-3 py-1 rounded-full border border-emerald-500/20 flex items-center gap-1.5";
                spinner.classList.remove('hidden');
                
                logToConsole("⚡ Sunucu motoru başlatıldı. Telegram API sorgulanıyor...", "system");
                
                // Botu dinleme döngüsüne sok (Her 2 saniyede bir yeni mesaj var mı diye bakar)
                pollingInterval = setInterval(() => checkBotUpdates(token), 2000);
            } else {
                // Dinlemeyi Durdur
                isListening = false;
                clearInterval(pollingInterval);
                btnListen.innerHTML = `<i class="fa-solid fa-play"></i> Dinlemeyi Başlat (Start Server)`;
                btnListen.className = "w-full sm:w-auto bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-6 py-2.5 rounded shadow transition flex items-center justify-center gap-2";
                serverStatus.innerHTML = `<span class="h-2 w-2 rounded-full bg-red-500"></span> Sunucu Kapalı`;
                serverStatus.className = "bg-red-500/10 text-red-400 text-xs px-3 py-1 rounded-full border border-red-500/20 flex items-center gap-1.5";
                spinner.classList.add('hidden');
                
                logToConsole("🛑 Sunucu durduruldu.", "error");
            }
        }

        // Telegram API'den Mesajları Çeken Fonksiyon
        async function checkBotUpdates(token) {
            try {
                // getUpdates API'sini kullanarak bota gelen son mesajları çekiyoruz
                // offset parametresi sayesinde sadece yeni gelen mesajları alırız, eskileri tekrar okumayız
                const response = await fetch(`https://api.telegram.org/bot${token}/getUpdates?offset=${lastUpdateId + 1}&timeout=1`);
                const data = await response.json();

                if (data.ok && data.result.length > 0) {
                    data.result.forEach(update => {
                        lastUpdateId = update.update_id; // Son okunan ID'yi güncelle

                        if (update.message) {
                            const msg = update.message;
                            const userId = msg.from.id;
                            const firstName = msg.from.first_name || "Bilinmiyor";
                            const username = msg.from.username ? `@${msg.from.username}` : "Yok";
                            const text = msg.text || "[Metin Olmayan Mesaj/Medya]";

                            // Tam istediğin format: ID, Ad, Kullanıcı Adı ve Mesaj ekrana canlı basılır
                            const logFormat = `💬 YENİ MESAJ -> <b>ID:</b> ${userId} | <b>Ad:</b> ${firstName} | <b>User:</b> ${username} | <b>Mesaj:</b> <span class="text-amber-300">"${text}"</span>`;
                            logToConsole(logFormat, 'success');
                        }
                    });
                }
            } catch (error) {
                console.error("Sorgulama hatası:", error);
                logToConsole("⚠️ Telegram API bağlantı hatası oluştu, tekrar deneniyor...", "error");
            }
        }
    </script>
</body>
</html>
