<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONİX HACK | Live Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Siber Parlama ve Özel Animasyonlar */
        .neon-glow {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }
        .neon-glow-green {
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }
        @keyframes pulse-fast {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .pulse-fast {
            animation: pulse-fast 1s infinite;
        }
        /* Arka Plan Hareketli Matris Çizgileri */
        .bg-cyber {
            background: linear-gradient(180deg, rgba(3, 7, 18, 0.95) 0%, rgba(17, 24, 39, 0.98) 100%);
            position: relative;
            overflow-x: hidden;
        }
        .bg-cyber::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 1;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* 📱 MOBİL KAYDIRMA ÇÖZÜMÜ (SCROLL FIX) */
        .scrollable-terminal {
            overflow-y: auto !important;
            -webkit-overflow-scrolling: touch !important; /* iOS ve Android webview akıcılığı */
            touch-action: pan-y !important; /* Sadece dikey kaydırmaya izin ver */
        }
        
        /* İnce Kaydırma Çubuğu Tasarımı */
        .scrollable-terminal::-webkit-scrollbar {
            width: 6px;
        }
        .scrollable-terminal::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }
        .scrollable-terminal::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.5);
            border-radius: 3px;
        }
    </style>
</head>
<body class="bg-cyber text-gray-100 font-sans min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-gray-950/80 backdrop-blur border-b border-indigo-500/30 p-4 shadow-lg z-10 relative">
        <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-emerald-400 flex items-center gap-2">
                <i class="fa-solid fa-user-secret text-indigo-400 animate-bounce"></i> SONİX HACK
            </h1>
            <div class="flex items-center gap-3">
                <span id="server-status" class="bg-red-500/10 text-red-400 text-xs px-4 py-1.5 rounded-full border border-red-500/30 flex items-center gap-2 font-mono">
                    <span class="h-2 w-2 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]"></span> SERVER: OFFLINE
                </span>
            </div>
        </div>
    </nav>

    <!-- Ana İçerik -->
    <div class="container mx-auto p-4 sm:p-6 flex-1 flex flex-col gap-4 z-10 relative">
        
        <!-- Üst Kontrol Paneli -->
        <div class="bg-gray-900/90 border border-indigo-500/20 p-5 rounded-2xl shadow-2xl neon-glow backdrop-blur flex flex-col gap-4">
            <div>
                <label class="text-xs text-indigo-400 font-mono block mb-1.5 uppercase tracking-wider">Target Bot Token:</label>
                <input type="text" id="bot-token" value="8738504549:AAHBiEr6JMEE-g8dGAqfe_4UfIOe3NR9neQ" class="w-full bg-gray-950/80 border border-gray-800 p-3 text-emerald-400 font-mono text-xs rounded-xl focus:outline-none focus:border-indigo-500 shadow-inner">
            </div>
            
            <div class="flex flex-wrap gap-3">
                <button onclick="toggleServer()" id="btn-listen" class="flex-1 sm:flex-initial bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-6 py-3 rounded-xl shadow-lg transition duration-300 flex items-center justify-center gap-2 uppercase tracking-wider cursor-pointer">
                    <i class="fa-solid fa-power-off"></i> Dinlemeyi Başlat
                </button>
                <button onclick="downloadLogs()" class="bg-gray-800/80 hover:bg-gray-700 text-gray-300 text-xs font-semibold px-5 py-3 rounded-xl transition flex items-center justify-center gap-2 cursor-pointer border border-gray-700">
                    <i class="fa-solid fa-file-arrow-down"></i> Dışa Aktar
                </button>
                <button onclick="clearLogs()" class="bg-gray-900 hover:bg-red-900/30 hover:text-red-400 text-gray-500 text-xs px-4 py-3 rounded-xl transition border border-gray-800 cursor-pointer">
                    Temizle
                </button>
            </div>
        </div>

        <!-- Canlı Arama Motoru -->
        <div class="relative">
            <i class="fa-solid fa-terminal absolute left-4 top-4 text-indigo-500 text-xs"></i>
            <input type="text" id="search-input" onkeyup="filterLogs()" placeholder="Veritabanında filtreleme yap (ID, isim, mesaj)..." class="w-full bg-gray-900/60 border border-indigo-500/10 pl-10 pr-4 py-3.5 text-xs rounded-2xl focus:outline-none focus:border-indigo-500/50 text-gray-300 font-mono backdrop-blur shadow-inner">
        </div>

        <!-- Canlı Terminal Ekranı -->
        <div class="bg-gray-950/90 rounded-2xl border border-indigo-500/20 p-5 shadow-2xl flex flex-col flex-1 min-h-[350px] backdrop-blur">
            <div class="flex justify-between items-center mb-3 border-b border-gray-900 pb-2.5">
                <h2 class="text-xs font-bold text-emerald-400 font-mono flex items-center gap-2 uppercase tracking-widest">
                    <i class="fa-solid fa-circle-notch animate-spin text-[10px] hidden" id="loading-spinner"></i> STREAM DATA FEED
                </h2>
                <span id="log-count" class="text-[10px] font-mono bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2.5 py-0.5 rounded-md">0 LOGS</span>
            </div>
            
            <!-- Matrix Tarzı Akış Alanı (Dikey Kaydırma Özellikli) -->
            <div id="console-logs" class="scrollable-terminal flex-1 p-2 font-mono text-xs text-emerald-400 space-y-2 max-h-[380px]">
                <p class="text-gray-600 italic border-l border-gray-800 pl-2">[SYSTEM STATION READY. PRESS POWER TO BEGIN CAPTURE...]</p>
            </div>
        </div>

        <!-- İletişim & Destek Kartı -->
        <div class="bg-gradient-to-r from-gray-900 via-indigo-950/40 to-gray-900 border border-indigo-500/20 p-4 rounded-2xl flex flex-col sm:flex-row justify-between items-center gap-4 shadow-xl backdrop-blur">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-indigo-500/10 border border-indigo-500/30 flex items-center justify-center text-indigo-400">
                    <i class="fa-solid fa-headset text-lg animate-pulse"></i>
                </div>
                <div>
                    <h4 class="text-xs font-bold uppercase tracking-wider text-white">Yardım & Teknik Destek</h4>
                    <p class="text-[11px] text-gray-400">Sistem veya kurulumla ilgili sorunlar için iletişim hattı</p>
                </div>
            </div>
            <a href="https://t.me/sonixhack" target="_blank" class="w-full sm:w-auto bg-sky-600/10 hover:bg-sky-600/20 border border-sky-500/30 text-sky-400 font-bold text-xs px-5 py-2.5 rounded-xl transition duration-300 flex items-center justify-center gap-2 tracking-wide neon-glow-green">
                <i class="fa-brands fa-telegram text-base animate-bounce"></i> @sonixhack
            </a>
        </div>

    </div>

    <script>
        let isListening = false;
        let lastUpdateId = 0;
        let pollingInterval = null;
        let allLogsRaw = [];

        const serverStatus = document.getElementById('server-status');
        const btnListen = document.getElementById('btn-listen');
        const consoleLogs = document.getElementById('console-logs');
        const spinner = document.getElementById('loading-spinner');
        const logCountSpan = document.getElementById('log-count');

        function playBeep() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.connect(gain);
            gain.connect(context.destination);
            osc.type = "sine";
            osc.frequency.setValueAtTime(900, context.currentTime);
            gain.gain.setValueAtTime(0.05, context.currentTime);
            osc.start();
            osc.stop(context.currentTime + 0.08);
        }

        function logToConsole(message, type = 'info', rawText = '') {
            const time = new Date().toLocaleTimeString('tr-TR');
            let colorClass = "text-gray-500";
            
            if (type === 'success') {
                colorClass = "text-emerald-400 border-l-2 border-emerald-500 pl-3 bg-emerald-500/5 py-1.5 rounded-xl shadow-sm log-item";
                playBeep();
                if(rawText) allLogsRaw.push(`[${time}] ${rawText}`);
            }
            if (type === 'error') colorClass = "text-red-400 font-bold bg-red-500/5 p-2 rounded-xl border border-red-500/20";
            if (type === 'system') colorClass = "text-indigo-400 italic font-semibold pl-2 border-l border-indigo-500/30";

            const logItem = document.createElement('div');
            logItem.className = `mb-1 ${colorClass}`;
            logItem.innerHTML = `<span class="text-gray-600 font-normal">[${time}]</span> ${message}`;
            
            if(type !== 'success') logItem.classList.add('system-msg');
            
            consoleLogs.appendChild(logItem);
            
            // Otomatik olarak en aşağı kaydır, ancak kullanıcı eliye yukarı çıktıysa engelleme
            consoleLogs.scrollTop = consoleLogs.scrollHeight;
            
            const count = consoleLogs.querySelectorAll('.log-item').length;
            logCountSpan.innerText = `${count} LOGS`;
        }

        function clearLogs() {
            consoleLogs.innerHTML = '<p class="text-gray-600 italic border-l border-gray-800 pl-2">[TERMINAL BUFFER CLEARED...]</p>';
            allLogsRaw = [];
            logCountSpan.innerText = '0 LOGS';
        }

        function toggleServer() {
            const token = document.getElementById('bot-token').value.trim();
            if (!token) return alert("Hata: Token alanı boş bırakılamaz!");

            if (!isListening) {
                isListening = true;
                btnListen.innerHTML = `<i class="fa-solid fa-power-off"></i> Dinlemeyi Durdur`;
                btnListen.className = "flex-1 sm:flex-initial bg-red-600 hover:bg-red-500 text-white text-xs font-bold px-6 py-3 rounded-xl shadow-lg transition duration-300 flex items-center justify-center gap-2 uppercase tracking-wider cursor-pointer";
                serverStatus.innerHTML = `<span class="h-2 w-2 rounded-full bg-emerald-400 animate-pulse shadow-[0_0_8px_#10b981]"></span> SERVER: ACTIVE`;
                serverStatus.className = "bg-emerald-500/10 text-emerald-400 text-xs px-4 py-1.5 rounded-full border border-emerald-500/30 flex items-center gap-2 font-mono";
                spinner.classList.remove('hidden');
                
                logToConsole("Bağlantı tüneli açıldı. Gelen paketler dinleniyor...", "system");
                pollingInterval = setInterval(() => checkBotUpdates(token), 2000);
            } else {
                isListening = false;
                clearInterval(pollingInterval);
                btnListen.innerHTML = `<i class="fa-solid fa-power-off"></i> Dinlemeyi Başlat`;
                btnListen.className = "flex-1 sm:flex-initial bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-6 py-3 rounded-xl shadow-lg transition duration-300 flex items-center justify-center gap-2 uppercase tracking-wider cursor-pointer";
                serverStatus.innerHTML = `<span class="h-2 w-2 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]"></span> SERVER: OFFLINE`;
                serverStatus.className = "bg-red-500/10 text-red-400 text-xs px-4 py-1.5 rounded-full border border-red-500/30 flex items-center gap-2 font-mono";
                spinner.classList.add('hidden');
                
                logToConsole("Oturum kapatıldı. Dinleme kesildi.", "system");
            }
        }

        async function checkBotUpdates(token) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${token}/getUpdates?offset=${lastUpdateId + 1}&timeout=1`);
                const data = await response.json();

                if (data.ok && data.result.length > 0) {
                    data.result.forEach(update => {
                        lastUpdateId = update.update_id;

                        if (update.message) {
                            const msg = update.message;
                            const userId = msg.from.id;
                            const name = msg.from.first_name || "Bilinmiyor";
                            const user = msg.from.username ? `@${msg.from.username}` : "Yok";
                            const text = msg.text || "[Medya Paket]";

                            const htmlFormat = `<span class="text-indigo-400 font-bold">INCOMING-PACKET</span> -> <b>ID:</b> <span class="text-white">${userId}</span> | <b>Ad:</b> <span class="text-white">${name}</span> | <b>User:</b> <span class="text-indigo-300">${user}</span> | <span class="text-amber-300">"${text}"</span>`;
                            const rawFormat = `ID: ${userId} | İsim: ${name} | Kullanıcı: ${user} | Mesaj: ${text}`;
                            
                            logToConsole(htmlFormat, 'success', rawFormat);
                        }
                    });
                }
            } catch (error) {
                console.error(error);
            }
        }

        function filterLogs() {
            const input = document.getElementById('search-input').value.toLowerCase();
            const items = consoleLogs.getElementsByTagName('div');

            for (let i = 0; i < items.length; i++) {
                if(items[i].classList.contains('system-msg')) continue;
                const text = items[i].innerText.toLowerCase();
                items[i].style.display = text.includes(input) ? "" : "none";
            }
        }

        function downloadLogs() {
            if(allLogsRaw.length === 0) return alert("Hata: Aktarılacak ham veri kaydı bulunamadı!");
            
            const blob = new Blob([allLogsRaw.join('\n')], { type: 'text/plain' });
            const a = document.createElement('a');
            a.download = `sonix_hack_export_${new Date().toISOString().slice(0,10)}.txt`;
            a.href = window.URL.createObjectURL(blob);
            a.click();
        }
    </script>
</body>
</html>
